<!DOCTYPE html>
<html>
<head>
  <title>Web Proxy</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      backdrop-filter: blur(15px);
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      width: 350px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    p {
      color: #cbd5f5;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #0ea5e9;
    }

    /* 🔥 LOADING SCREEN */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <!-- 🔥 Loading Overlay -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <div class="container">
    <h1>Web Proxy</h1>
    <p>Browse the web securely</p>

    <input id="url" placeholder="Search or enter URL">
    <button onclick="go()">Go</button>
  </div>

  <script>
    function go() {
      let input = document.getElementById("url").value;

      if (!input.startsWith("http")) {
        input = "https://www.google.com/search?q=" + encodeURIComponent(input);
      }

      // 🔥 Show loading screen
      document.getElementById("loading").style.display = "flex";

      // slight delay so animation shows
      setTimeout(() => {
        window.location.href = "/math/" + __uv$config.encodeUrl(input);
      }, 300);
    }
  </script>

</body>
</html>
