<!DOCTYPE html>
<html>
<head>
  <title>Web Proxy</title>

  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial;
    }

    .box {
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    #loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }
  </style>
</head>

<body>

<div id="loading">
  <h2 id="status">Connecting...</h2>
</div>

<div class="box">
  <h1>Web Proxy</h1>
  <input id="url" placeholder="Enter URL">
  <button onclick="go()">Go</button>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/uv/uv.sw.js', {
    scope: '/uv/'
  });
}

function go() {
  let input = document.getElementById("url").value;

  if (!input.startsWith("http")) {
    input = "https://www.google.com/search?q=" + encodeURIComponent(input);
  }

  document.getElementById("loading").style.display = "flex";

  setTimeout(() => {
    location.href = "/uv/" + __uv$config.encodeUrl(input);
  }, 1000);
}
</script>

</body>
</html>
