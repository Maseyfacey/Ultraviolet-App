<!DOCTYPE html>
<html>
<head>
  <title>Web Proxy</title>

  <!-- REQUIRED UV FILES -->
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      margin-left: 5px;
      border-radius: 8px;
      border: none;
      background: #38bdf8;
      cursor: pointer;
    }

    #loading {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#020617;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .bar {
      width:200px;
      height:5px;
      background:#333;
      margin-top:10px;
    }

    .progress {
      height:100%;
      width:0%;
      background:#38bdf8;
    }
  </style>
</head>

<body>

<div id="loading">
  <div id="status">Connecting...</div>
  <div class="bar"><div class="progress" id="progress"></div></div>
</div>

<div class="box">
  <h2>Web Proxy</h2>
  <input id="url" placeholder="Enter URL">
  <button onclick="go()">Go</button>
</div>

<script>
function go() {
  let input = document.getElementById("url").value;

  if (!input.startsWith("http")) {
    input = "https://www.google.com/search?q=" + encodeURIComponent(input);
  }

  const load = document.getElementById("loading");
  const prog = document.getElementById("progress");
  const status = document.getElementById("status");

  load.style.display = "flex";

  let steps = [
    "Connecting...",
    "Routing...",
    "Encrypting...",
    "Loading..."
  ];

  let p = 0;
  let i = 0;

  let int = setInterval(() => {
    p += uv.random() * 30;
    if (p > 100) p = 100;

    prog.style.width = p + "%";

    if (i < steps.length) {
      status.innerText = steps[i++];
    }

    if (p >= 100) {
      clearInterval(int);
      window.location.href = "/uv/" + __uv$config.encodeUrl(input);
    }
  }, 400);
}
</script>

</body>
</html>
