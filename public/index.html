<!DOCTYPE html>
<html>
<head>
  <title>Web Proxy</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      margin: auto;
      top: 50%;
      transform: translateY(-50%);
      width: 350px;
      padding: 40px;
      text-align: center;

      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    /* ⚡ Glitch effect */
    h1 {
      position: relative;
      font-size: 26px;
    }

    h1::before, h1::after {
      content: "Web Proxy";
      position: absolute;
      left: 0;
      width: 100%;
    }

    h1::before {
      color: #0ff;
      animation: glitch 2s infinite;
    }

    h1::after {
      color: #f0f;
      animation: glitch 2s infinite reverse;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    /* 🔐 Secure screen */
    #secure {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #020617;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .lock {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .status {
      margin-bottom: 15px;
      color: #94a3b8;
    }

    .bar {
      width: 250px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #38bdf8;
      transition: width 0.3s;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- 🔐 Secure screen -->
<div id="secure">
  <div class="lock">🔐</div>
  <div class="status" id="status">Initializing secure connection...</div>
  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<div class="container">
  <h1>Web Proxy</h1>
  <p>Secure browsing interface</p>

  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Connect</button>
</div>

<script>
/* 🌌 PARTICLES */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: Math.random() - 0.5,
    dy: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.dx;
    p.y += p.dy;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

/* 🚀 PROXY */
function go() {
  let input = document.getElementById("url").value;

  if (!input.startsWith("http")) {
    input = "https://www.google.com/search?q=" + encodeURIComponent(input);
  }

  const secure = document.getElementById("secure");
  const progress = document.getElementById("progress");
  const status = document.getElementById("status");

  secure.style.display = "flex";

  let steps = [
    "Initializing secure connection...",
    "Encrypting request...",
    "Routing traffic...",
    "Establishing tunnel...",
    "Connected"
  ];

  let percent = 0;
  let i = 0;

  let interval = setInterval(() => {
    percent += Math.random() * 20;
    if (percent > 100) percent = 100;

    progress.style.width = percent + "%";

    if (i < steps.length) {
      status.innerText = steps[i];
      i++;
    }

    if (percent >= 100) {
      clearInterval(interval);

      setTimeout(() => {
        window.location.href = "/math/" + __uv$config.encodeUrl(input);
      }, 400);
    }
  }, 400);
}
</script>

</body>
</html>
